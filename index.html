<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="index.js"></script>
    <title>Slice me up</title>
  </head>
  <body>
    <div class="titles">
      <h1>Slice Me Up</h1>
      <p>Enter Your Word Below</p>
    </div>
    <div class="input">
      <input type="text" />
      <p>Enter Your Word</p>
    </div>
    <div class="slicer">
      <div class="form-control">
        <label for="">First Index</label>
        <input type="number" data-type="firstIndex" />
      </div>
      <div class="form-control">
        <label for="">Second Index</label>
        <input type="number" data-type="secondIndex" />
      </div>
    </div>
    <p class="sliced-output">Your Sliced String</p>
  </body>
</html>
